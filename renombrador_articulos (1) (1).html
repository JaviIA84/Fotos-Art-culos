<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Renombrador de Artículos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f1;
    --surface: #ffffff;
    --border: #e0ddd6;
    --border-hover: #c8c4bc;
    --text: #1a1917;
    --muted: #72706b;
    --hint: #a09e99;
    --accent: #1a1917;
    --accent-fg: #ffffff;
    --success-bg: #eaf3de;
    --success: #3b6d11;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --info-bg: #e6f1fb;
    --info: #185fa5;
    --radius: 10px;
    --font: 'DM Sans', system-ui, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1917;
      --surface: #26241f;
      --border: #3a3832;
      --border-hover: #524f48;
      --text: #f0ede8;
      --muted: #a09e99;
      --hint: #72706b;
      --accent: #f0ede8;
      --accent-fg: #1a1917;
      --success-bg: #173404;
      --success: #97c459;
      --danger: #f09595;
      --danger-bg: #501313;
      --info-bg: #042c53;
      --info: #85b7eb;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container { width: 100%; max-width: 480px; }

  header { margin-bottom: 1.5rem; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  header p { font-size: 14px; color: var(--muted); margin-top: 4px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
  }

  .field { margin-bottom: 1.25rem; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  label svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input[type="text"]:focus { border-color: var(--border-hover); }
  input[type="text"]::placeholder { color: var(--hint); }

  /* Drop zone escritorio */
  .drop-zone {
    border: 1.5px dashed var(--border-hover);
    border-radius: 8px;
    padding: 1.75rem 1rem;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
  }
  .drop-zone:hover, .drop-zone.over { background: var(--bg); border-color: var(--text); }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-zone .dz-icon { width: 32px; height: 32px; stroke: var(--hint); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; display: block; margin: 0 auto 10px; }
  .drop-zone p { font-size: 14px; color: var(--muted); }
  .drop-zone small { font-size: 12px; color: var(--hint); margin-top: 4px; display: block; }

  /* Botones móvil */
  .mobile-btns { display: none; gap: 10px; }
  @media (pointer: coarse) {
    .drop-zone { display: none; }
    .mobile-btns { display: flex; }
  }
  .mbtn {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.15s;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .mbtn:active { background: var(--border); }
  .mbtn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; font-size: 0; }
  .mbtn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* Barra de compresión */
  .compress-wrap {
    display: none;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--info-bg);
    border-radius: 8px;
  }
  .compress-wrap .c-label { font-size: 12px; color: var(--info); display: flex; justify-content: space-between; }
  .compress-wrap progress {
    width: 100%; height: 4px; border: none; border-radius: 99px;
    appearance: none; -webkit-appearance: none; overflow: hidden;
    background: rgba(0,0,0,0.1);
  }
  .compress-wrap progress::-webkit-progress-bar { background: rgba(0,0,0,0.1); border-radius: 99px; }
  .compress-wrap progress::-webkit-progress-value { background: var(--info); border-radius: 99px; transition: width 0.25s; }
  .compress-wrap progress::-moz-progress-bar { background: var(--info); }

  /* Preview */
  .preview {
    display: none;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .preview img { width: 52px; height: 52px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
  .preview-info { flex: 1; min-width: 0; }
  .preview-info .fname { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .preview-info .fsize { font-size: 12px; color: var(--hint); margin-top: 2px; }
  .btn-remove { background: none; border: none; cursor: pointer; color: var(--hint); padding: 4px; border-radius: 4px; display: flex; align-items: center; transition: color 0.1s; }
  .btn-remove:hover { color: var(--danger); }
  .btn-remove svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

  .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

  .btn-save {
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px;
    font-family: var(--font); font-size: 15px; font-weight: 600;
    cursor: pointer; border-radius: 8px;
    background: var(--accent); color: var(--accent-fg);
    border: none; transition: opacity 0.15s, transform 0.1s;
    letter-spacing: -0.01em;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:active { transform: scale(0.98); }
  .btn-save:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-save svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .msg { display: none; align-items: center; gap: 8px; font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-top: 12px; line-height: 1.4; }
  .msg svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .msg.success { background: var(--success-bg); color: var(--success); }
  .msg.error { background: var(--danger-bg); color: var(--danger); }

  .history { margin-top: 1.25rem; }
  .history-title { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--hint); margin-bottom: 8px; }
  .history-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
  .history-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); padding: 7px 10px; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); }
  .history-item svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }
  .history-item .h-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .history-item .h-size { font-size: 11px; color: var(--hint); flex-shrink: 0; }

  .counter { font-size: 12px; color: var(--hint); text-align: center; margin-top: 1rem; }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📷 Renombrador de artículos</h1>
    <p>Escribí el nombre, cargá o sacá una foto, y guardá.</p>
  </header>

  <div class="card">

    <div class="field">
      <label>
        <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        Nombre del artículo
      </label>
      <input type="text" id="art-name" placeholder="Ej: Remera azul talle M" autocomplete="off" />
    </div>

    <div class="field">
      <label>
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Foto del artículo
      </label>

      <!-- Escritorio -->
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input-desk" accept="image/*" />
        <svg class="dz-icon" viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        <p id="dz-text">Arrastrá una imagen o hacé clic para seleccionar</p>
        <small>JPG · PNG · WEBP · GIF &nbsp;·&nbsp; máx. 800 KB al guardar</small>
      </div>

      <!-- Móvil -->
      <div class="mobile-btns">
        <button class="mbtn" type="button">
          <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Sacar foto
          <input type="file" id="file-input-cam" accept="image/*" capture="environment" />
        </button>
        <button class="mbtn" type="button">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Elegir foto
          <input type="file" id="file-input-gal" accept="image/*" />
        </button>
      </div>

      <!-- Barra compresión -->
      <div class="compress-wrap" id="compress-wrap">
        <div class="c-label">
          <span id="compress-label">Optimizando imagen…</span>
          <span id="compress-pct">0%</span>
        </div>
        <progress id="compress-bar" value="0" max="100"></progress>
      </div>

      <!-- Preview -->
      <div class="preview" id="preview">
        <img id="thumb" src="" alt="Vista previa" />
        <div class="preview-info">
          <div class="fname" id="prev-name">—</div>
          <div class="fsize" id="prev-size">—</div>
        </div>
        <button class="btn-remove" id="btn-remove" title="Quitar imagen">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <button class="btn-save" id="btn-save" disabled>
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Guardar con nombre del artículo
    </button>

    <div class="msg success" id="msg-success">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="msg-text"></span>
    </div>
    <div class="msg error" id="msg-error">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="msg-err-text">Completá todos los campos.</span>
    </div>
  </div>

  <div class="history" id="history-section" style="display:none;">
    <div class="history-title">Guardados en esta sesión</div>
    <div class="history-list" id="history-list"></div>
  </div>
  <div class="counter" id="counter" style="display:none;"></div>
</div>

<script>
(function () {
  var MAX_BYTES = 800 * 1024;

  var artName    = document.getElementById('art-name');
  var fiDesk     = document.getElementById('file-input-desk');
  var fiCam      = document.getElementById('file-input-cam');
  var fiGal      = document.getElementById('file-input-gal');
  var dropZone   = document.getElementById('drop-zone');
  var dzText     = document.getElementById('dz-text');
  var preview    = document.getElementById('preview');
  var thumb      = document.getElementById('thumb');
  var prevName   = document.getElementById('prev-name');
  var prevSize   = document.getElementById('prev-size');
  var btnRemove  = document.getElementById('btn-remove');
  var btnSave    = document.getElementById('btn-save');
  var msgOk      = document.getElementById('msg-success');
  var msgTxt     = document.getElementById('msg-text');
  var msgErr     = document.getElementById('msg-error');
  var msgErrTxt  = document.getElementById('msg-err-text');
  var compWrap   = document.getElementById('compress-wrap');
  var compLabel  = document.getElementById('compress-label');
  var compPct    = document.getElementById('compress-pct');
  var compBar    = document.getElementById('compress-bar');
  var histSec    = document.getElementById('history-section');
  var histList   = document.getElementById('history-list');
  var counter    = document.getElementById('counter');

  var processedBlob = null;
  var originalExt   = 'jpg';
  var count = 0;

  function fmt(b) {
    return b < 1048576 ? Math.round(b / 1024) + ' KB' : (b / 1048576).toFixed(1) + ' MB';
  }

  function sanitize(s) {
    return s.trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[<>:"/\\|?*\x00-\x1F]/g, '')
      .replace(/\s+/g, '_') || 'articulo';
  }

  function checkReady() {
    btnSave.disabled = !(artName.value.trim() && processedBlob);
  }

  function hideMessages() {
    msgOk.style.display = 'none';
    msgErr.style.display = 'none';
  }

  function showErr(txt) {
    msgErrTxt.textContent = txt;
    msgErr.style.display = 'flex';
    msgOk.style.display = 'none';
  }

  function setProgress(pct, label) {
    compBar.value = pct;
    compPct.textContent = pct + '%';
    if (label) compLabel.textContent = label;
  }

  // Compresión iterativa con búsqueda binaria de calidad JPEG
  function compressToLimit(imgFile, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        // Si ya entra, devolver directo como blob
        if (imgFile.size <= MAX_BYTES) {
          imgFile.arrayBuffer().then(function(buf) {
            callback(new Blob([buf], { type: imgFile.type }), false);
          });
          return;
        }

        var canvas = document.createElement('canvas');
        var w = img.naturalWidth;
        var h = img.naturalHeight;
        var MAX_DIM = 1800;
        if (w > MAX_DIM || h > MAX_DIM) {
          var ratio = Math.min(MAX_DIM / w, MAX_DIM / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        canvas.width  = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        var lo = 0.1, hi = 0.92, best = null;
        var step = 0, STEPS = 8;

        function iterate() {
          if (step >= STEPS) {
            // Si nunca encontramos uno que entre, forzar calidad mínima
            if (!best) {
              canvas.toBlob(function(b) { callback(b, true); }, 'image/jpeg', 0.1);
            } else {
              callback(best, true);
            }
            return;
          }
          var q = (lo + hi) / 2;
          setProgress(Math.round(((step + 1) / STEPS) * 95), 'Optimizando imagen…');
          canvas.toBlob(function(blob) {
            if (!blob) { callback(best, true); return; }
            if (blob.size <= MAX_BYTES) { best = blob; lo = q; }
            else { hi = q; }
            step++;
            setTimeout(iterate, 8);
          }, 'image/jpeg', q);
        }
        iterate();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(imgFile);
  }

  function loadFile(f) {
    if (!f || !f.type.startsWith('image/')) { showErr('El archivo debe ser una imagen válida.'); return; }

    hideMessages();
    processedBlob = null;
    checkReady();

    // Preview inmediata
    var previewUrl = URL.createObjectURL(f);
    thumb.src = previewUrl;
    prevName.textContent = f.name;
    prevSize.textContent = fmt(f.size);
    preview.style.display = 'flex';
    if (dzText) dzText.textContent = 'Imagen cargada ✓';
    originalExt = f.name.includes('.') ? f.name.split('.').pop().toLowerCase() : 'jpg';

    if (f.size > MAX_BYTES) {
      compWrap.style.display = 'flex';
      setProgress(3, 'Optimizando imagen…');
      btnSave.disabled = true;
    }

    compressToLimit(f, function(blob, wasCompressed) {
      processedBlob = blob;
      setProgress(100, wasCompressed ? 'Imagen optimizada ✓' : 'Sin cambios necesarios');
      prevSize.textContent = wasCompressed
        ? fmt(f.size) + ' → ' + fmt(blob.size)
        : fmt(f.size);
      setTimeout(function() { compWrap.style.display = 'none'; }, 1400);
      checkReady();
    });
  }

  function resetForm() {
    processedBlob = null;
    fiDesk.value = '';
    if (fiCam) fiCam.value = '';
    if (fiGal) fiGal.value = '';
    thumb.src = '';
    preview.style.display = 'none';
    compWrap.style.display = 'none';
    if (dzText) dzText.textContent = 'Arrastrá una imagen o hacé clic para seleccionar';
    artName.value = '';
    btnSave.disabled = true;
    hideMessages();
  }

  fiDesk.addEventListener('change', function() { if (fiDesk.files[0]) loadFile(fiDesk.files[0]); });
  if (fiCam) fiCam.addEventListener('change', function() { if (fiCam.files[0]) loadFile(fiCam.files[0]); });
  if (fiGal) fiGal.addEventListener('change', function() { if (fiGal.files[0]) loadFile(fiGal.files[0]); });

  dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('over'); });
  dropZone.addEventListener('drop', function(e) {
    e.preventDefault(); dropZone.classList.remove('over');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  btnRemove.addEventListener('click', resetForm);
  artName.addEventListener('input', function() { hideMessages(); checkReady(); });

  btnSave.addEventListener('click', function() {
    if (!artName.value.trim() || !processedBlob) { showErr('Completá el nombre y seleccioná una imagen.'); return; }

    var ext = (processedBlob.type === 'image/jpeg') ? '.jpg' : ('.' + originalExt);
    var newName = sanitize(artName.value) + ext;
    var finalSize = fmt(processedBlob.size);

    var url = URL.createObjectURL(processedBlob);
    var a = document.createElement('a');
    a.href = url; a.download = newName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);

    msgTxt.textContent = 'Guardado como: ' + newName + ' (' + finalSize + ')';
    msgOk.style.display = 'flex';
    msgErr.style.display = 'none';

    count++;
    var item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
      + '<span class="h-name">' + newName + '</span>'
      + '<span class="h-size">' + finalSize + '</span>';
    histList.prepend(item);
    histSec.style.display = 'block';
    counter.style.display = 'block';
    counter.textContent = count + (count === 1 ? ' archivo guardado en esta sesión' : ' archivos guardados en esta sesión');

    resetForm();
    artName.focus();
  });
})();
</script>
</body>
</html>
